# Nocti — cerebro (brain, Python) + brazo (exec, Node), sobre Postgres y Redis.
#
#   docker compose up -d               → solo Redis (el bus). Es lo mínimo.
#   docker compose --profile app up -d → + brain, exec y el dashboard Streamlit
#   docker compose --profile db  up -d → + un Postgres vacío en el 5434
#
# Postgres NO arranca por defecto. El histórico de `book_snapshots` vive en el
# PostgreSQL 18 de la máquina, y ese histórico es lo que alimenta el veredicto
# go/no-go. Un contenedor nuevo te daría una base vacía y ninguna advertencia.
#
# Todo bindeado a 127.0.0.1: nada de esto debe ser alcanzable desde fuera.
# Para verlo en remoto, túnel SSH:  ssh -L 8000:localhost:8000 usuario@host

services:
  # Postgres en contenedor, bajo perfil `db`: NO arranca por defecto.
  #
  #   docker compose --profile db up -d
  #
  # Este NO es el Postgres de producción. brain usa el PostgreSQL 18 de la
  # máquina, donde vive el histórico de `book_snapshots` que alimenta el veredicto
  # go/no-go. Éste es **la base de los tests**, que escriben y borran filas:
  #
  #   $env:UMBRA_TEST_DATABASE_URL = "postgresql+psycopg://umbra:umbra_dev@localhost:5434/umbra_test"
  #   cd apps/brain && .venv/Scripts/python -m alembic upgrade head
  #   .venv/Scripts/python -m pytest
  #
  # Sin esa variable, tests/conftest.py apunta a una base inexistente a propósito.
  # Antes no lo hacía, y una tanda de pytest metió 31 snapshots sintéticos dentro
  # de la serie histórica real.
  #
  # Puerto 5434 y no 5432: el 5432 lo tiene PG18 y el 5433 PG15. Chocar aquí sería
  # un rato perdido buscando por qué Alembic migró "la base equivocada".
  postgres:
    profiles: ["db"]
    image: postgres:16-alpine
    container_name: nocti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: umbra_dev
      POSTGRES_DB: umbra_test
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - nocti_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbra -d umbra_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nocti_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nocti_redisdata:/data
    # appendonly: el kill-switch `umbra:halt` y las claves de idempotencia
    # `nocti:intent:{id}` deben sobrevivir a un restart de Redis. Si se pierden,
    # exec puede volver a firmar un intent ya ejecutado.
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------------------------------------------------------------------
  # BRAIN — decide QUÉ y CUÁNTO. Nunca toca una clave privada.
  # ------------------------------------------------------------------
  brain:
    profiles: ["app"]
    build: ./apps/brain
    image: nocti-brain
    container_name: nocti_brain
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # Redis se resuelve por nombre de servicio dentro de la red de compose.
      REDIS_URL: redis://redis:6379/0
      # Postgres, en cambio, vive FUERA de compose por defecto: es el PG18 de la
      # máquina, con el histórico. `host.docker.internal` es cómo un contenedor
      # alcanza al host en Docker Desktop.
      # Si arrancas el perfil `db`, cambia esto a  ...@postgres:5432/umbra
      DATABASE_URL: ${DATABASE_URL_IN_DOCKER:-postgresql+psycopg://umbra:umbra_dev@host.docker.internal:5432/umbra}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ------------------------------------------------------------------
  # EXEC — decide CÓMO llenar. El único que firma.
  #
  # Habla exactamente dos idiomas: Redis y Polymarket. Sin DATABASE_URL: no
  # tiene credenciales de Postgres porque no las necesita. brain es el dueño de
  # la contabilidad y le pasa el universo de mercados por Redis.
  # ------------------------------------------------------------------
  exec:
    profiles: ["app"]
    build: ./apps/exec
    image: nocti-exec
    container_name: nocti_exec
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      # Fase 1: publica book:{condition_id} desde el WebSocket oficial.
      NOCTI_BOOK_PUBLISHER_ENABLED: ${NOCTI_BOOK_PUBLISHER_ENABLED:-false}
      # Fase 3: consume nocti:intents. `off` hasta entonces.
      NOCTI_EXEC_MODE: ${NOCTI_EXEC_MODE:-off}
      # Cinturón sobre tirantes: si alguien olvida DRY_RUN en .env, no se firma.
      DRY_RUN: ${DRY_RUN:-true}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_healthy

  # ------------------------------------------------------------------
  # UI — perfil opcional. `docker compose --profile ui up -d`
  # ------------------------------------------------------------------
  # Depende de que brain esté sano, así que vive en el mismo perfil que brain.
  brain-dashboard:
    profiles: ["app"]
    build: ./apps/brain
    image: nocti-brain
    container_name: nocti_brain_dashboard
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "dashboard/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true",
      ]
    environment:
      UMBRA_API_URL: http://brain:8000
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      brain:
        condition: service_healthy

volumes:
  nocti_pgdata:
  nocti_redisdata:
