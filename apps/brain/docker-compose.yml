services:
  postgres:
    image: postgres:16-alpine
    container_name: umbra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: umbra
      POSTGRES_PASSWORD: umbra_dev
      POSTGRES_DB: umbra
    ports:
      - "5432:5432"
    volumes:
      - umbra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbra -d umbra"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: umbra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - umbra_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  umbra_pgdata:
  umbra_redisdata:
